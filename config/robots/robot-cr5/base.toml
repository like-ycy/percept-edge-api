[upload]
remote_user = "root"
remote_port = 58320
ssh_key_path = "/home/ubuntu/.ssh/id_ed25519"

[desktop.runtime]
uv_bin = "/home/ubuntu/.local/bin/uv"
ros_env_cwd = ""
ros_setup_script = ""
roscore_cmd = ""
ros_slave_cmd = ""
ros_master_cmd = ""
robot_os_cwd = "/home/ubuntu/workspaces/percept-edge/ontology-core"
robot_os_cmd = "/usr/local/python3.10/bin/python3.10 /home/ubuntu/workspaces/percept-edge/ontology-core/robot_os.pyz core --log-level INFO"
api_cwd = "/home/ubuntu/workspaces/percept-edge/percept-edge-api"
api_cmd = "uv run main.py"
api_startup_timeout = 15.0
api_gate_interval = 1.0
status_poll_interval = 0.2
runtime_health_interval = 300.0
ros_startup_grace = 3.0
roscore_startup_grace = 2.0
ready_timeout = 30.0
monitor_timeout = 0.5
probe_interval = 1.0

[desktop.lift]
enabled = true
transport = "http"
api_path = "/api/desktop/lift/height"
min_height = 0
max_height = 2300
step = 100

[robot_control.electromagnet]
enabled = true
