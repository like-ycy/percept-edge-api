[upload]
remote_user = "root"
remote_port = 58320
ssh_key_path = "/home/agilex/.ssh/id_rsa"

[desktop.runtime]
uv_bin = "/home/agilex/.local/bin/uv"
ros_env_cwd = "/home/agilex/workspaces/ros_env/robotic_arm_ws/follow1"
ros_setup_script = "/home/agilex/workspaces/ros_env/robotic_arm_ws/follow1/devel/setup.bash"
roscore_cmd = "roscore"
ros_slave_cmd = "roslaunch arm_control L5.launch"
ros_master_cmd = "roslaunch arm_control L5.launch"
robot_os_cwd = "/home/agilex/workspaces/percept-edge/ontology-core"
robot_os_cmd = "/home/agilex/miniconda3/envs/py310/bin/python /home/agilex/workspaces/percept-edge/ontology-core/robot_os.pyz runtime --mode homologous --log-level INFO"
api_cwd = "/home/agilex/workspaces/percept-edge/percept-edge-api"
api_cmd = "uv run main.py"
api_startup_timeout = 15.0
api_gate_interval = 1.0
status_poll_interval = 0.2
runtime_health_interval = 300.0
ros_startup_grace = 3.0
roscore_startup_grace = 2.0
ready_timeout = 30.0
monitor_timeout = 0.5
probe_interval = 1.0

[[desktop.runtime.ros_commands]]
