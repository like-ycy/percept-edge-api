[upload]
remote_user = "root"
remote_port = 58320
ssh_key_path = "/home/cr4a/.ssh/id_rsa"

[desktop.runtime]
uv_bin = "/home/cr4a/.local/bin/uv"
ros_env_cwd = "/home/cr4a/workspaces/ros_env/X5_ws"
ros_setup_script = "/home/cr4a/workspaces/ros_env/X5_ws/devel/setup.bash"
roscore_cmd = "roscore"
ros_slave_cmd = "roslaunch arx_x5_controller open_remote_slave.launch"
ros_master_cmd = "roslaunch arx_x5_controller open_remote_master.launch"
vr_ros_enabled = true
vr_ros_prepare_countdown_seconds = 30
vr_ros_arm_cwd = "/home/cr4a/workspaces/ros_env/X5_ws"
vr_ros_arm_setup_script = "/home/cr4a/workspaces/ros_env/X5_ws/devel/setup.bash"
vr_ros_arm_cmd = "roslaunch arx_x5_controller open_vr_double_arm.launch"
vr_ros_serial_cwd = "/home/cr4a/workspaces/ros_env/vr_ws"
vr_ros_serial_setup_script = "/home/cr4a/workspaces/ros_env/vr_ws/devel/setup.bash"
vr_ros_serial_cmd = "rosrun serial_port serial_port"
robot_os_cwd = "/home/cr4a/workspaces/percept-edge/ontology-core"
robot_os_cmd = "/usr/local/bin/python3.10 /home/cr4a/workspaces/percept-edge/ontology-core/robot_os.pyz runtime --mode homologous --log-level INFO"
api_cwd = "/home/cr4a/workspaces/percept-edge/percept-edge-api"
api_cmd = "uv run main.py"
api_startup_timeout = 15.0
api_gate_interval = 1.0
status_poll_interval = 0.2
runtime_health_interval = 300.0
ros_startup_grace = 3.0
roscore_startup_grace = 2.0
ready_timeout = 30.0
monitor_timeout = 0.5
probe_interval = 1.0

[desktop.lift]
enabled = true
transport = "script"
api_path = "/api/desktop/lift/height"
python_bin = "/usr/local/bin/python3.10"
script_path = "/home/cr4a/workspaces/percept-edge/lift.py"
min_height = 0
max_height = 600
step = 100
