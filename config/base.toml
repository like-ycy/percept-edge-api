[server]
host = "0.0.0.0"
port = 8000
debug = false

[zeromq]
endpoint = "ipc:///tmp/robotos_collection"
rep_endpoint = "ipc:///tmp/robotos_monitor"

[webrtc]
stun_server = "stun:127.0.0.1:19302"

[webrtc.preview]
enabled = true
max_width = 1920
max_height = 540
max_fps = 15.0
fallback_width = 640
fallback_height = 360
max_encoded_frame_bytes = 16777216

[webrtc.codec]
enabled = true
preferred = ["video/H264", "video/VP8"]

[webrtc.preview.adaptive]
enabled = false
check_interval_seconds = 5.0
cooldown_seconds = 15.0
decode_ms_high = 30.0
recv_ms_high = 50.0
reuse_ratio_high = 0.5

[[webrtc.preview.adaptive.profiles]]
name = "high"
max_width = 1920
max_height = 540
max_fps = 15.0

[[webrtc.preview.adaptive.profiles]]
name = "medium"
max_width = 1280
max_height = 360
max_fps = 12.0

[[webrtc.preview.adaptive.profiles]]
name = "low"
max_width = 960
max_height = 270
max_fps = 10.0

[upload]
remote_port = 22
notify_endpoint = "/data/upload"
notify_timeout = 10
notify_retries = 3

[auth]
enabled = true
whitelist_paths = [
    "/favicon.ico",
    "/health",
    "/",
    "/docs",
    "/openapi.json",
    "/redoc",
    "/static",
    "/api/device/activate",
    "/api/device/activation-status",
    "/api/monitor/system",
    "/api/monitor/robot",
    "/api/collection/lock/status",
    "/api/collection/lock/release",
    "/api/upload/active",
    "/api/storage/raw-info",
    "/debug/zeromq",
    "/debug/processes",
    "/debug/webrtc"
]

[auth.iam]
verify_endpoint = "/auth/me"
timeout = 10

[task]
interval = 14400

[monitor]
interval = 300

[heartbeat]
enabled = true
interval = 180

[collection]
frame_drop_threshold = 0.10
video_only = false

[process_monitor]
enabled = true
sample_interval_seconds = 60.0
refresh_window_seconds = 0.5
cmdline_max_length = 200
