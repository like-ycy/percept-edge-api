[server]
host = "0.0.0.0"
port = 8000
debug = false

[zeromq]
endpoint = "ipc:///tmp/ontology_core.observation"
command_endpoint = "ipc:///tmp/ontology_core.command"
enable_runtime_watchdog = true
stale_threshold_seconds = 5.0
watchdog_interval_seconds = 1.0
startup_grace_seconds = 5.0

[webrtc]
stun_server = "stun:127.0.0.1:19302"

[upload]
remote_port = 22
notify_endpoint = "/data/upload"
notify_timeout = 10
notify_retries = 3

[auth]
enabled = true
whitelist_paths = [
    "/favicon.ico",
    "/health",
    "/",
    "/docs",
    "/openapi.json",
    "/redoc",
    "/static",
    "/api/device/activate",
    "/api/device/activation-status",
    "/api/monitor/system",
    "/api/monitor/robot",
    "/api/collection/lock/status",
    "/api/collection/lock/release",
    "/api/upload/active",
    "/api/desktop/lift/height",
    "/api/storage/raw-info",
    "/debug/zeromq",
    "/debug/processes"
]

[auth.iam]
verify_endpoint = "/auth/me"
timeout = 10

[task]
interval = 14400

[monitor]
interval = 300

[heartbeat]
enabled = true
interval = 180

[collection]
frame_drop_threshold = 0.10
video_only = false

[process_monitor]
enabled = true
sample_interval_seconds = 60.0
refresh_window_seconds = 0.5
cmdline_max_length = 200

[desktop.runtime]
process_shutdown_grace = 5.0
ros_shutdown_grace = 8.0
sigterm_shutdown_grace = 5.0
api_shutdown_grace = 60.0
force_kill_grace = 2.0

[robot_control.electromagnet]
enabled = false
