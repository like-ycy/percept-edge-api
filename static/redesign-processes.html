<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>进程监控面板</title>
  <link rel="stylesheet" href="assets/vercel-redesign.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><title>进程监控</title><path d="M4 4h16v16H4z"></path><path d="M8 8h8v8H8z"></path></svg>
          </span>
          <span class="brand-copy">
            <span class="brand-title">percept-static</span>
            <span class="brand-subtitle">进程监控面板</span>
          </span>
        </a>
        <nav class="topnav" aria-label="页面导航">
          <a href="index.html">入口</a>
          <a href="redesign-upload-reconcile.html">补偿上传</a>
          <a href="redesign-collection.html">数据采集</a>
          <a href="redesign-monitor.html">系统监控</a>
          <a class="active" href="redesign-processes.html">进程监控</a>
          <a href="redesign-unlock.html">采集锁</a>
          <a href="redesign-raw-info.html">原始数据</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <a class="backlink" href="index.html">← 返回入口</a>
      <section class="hero">
        <div class="hero-stack">
          <div class="eyebrow">GET /debug/processes</div>
          <h1>进程监控面板</h1>
          <p class="lead">主进程及递归子进程指标 · 数据源 <code>GET /debug/processes</code></p>
        </div>
        <div class="summary-strip">
          <span>采样时间 <strong id="sampled-at">—</strong></span>
          <span class="badge neutral" id="source-badge"><span class="dot"></span><span id="source-text">—</span></span>
          <span class="badge neutral" id="platform-badge"><span class="dot"></span><span id="platform-text">—</span></span>
          <div class="static-auth-status" data-static-auth-status></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>操作</h2>
          <div class="actions">
            <button class="btn" id="btn-snapshot" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><title>读取快照</title><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
              读取快照
            </button>
            <button class="btn primary" id="btn-refresh" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><title>实时刷新</title><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
              实时刷新
            </button>
            <label class="badge neutral" for="auto-toggle">
              <input type="checkbox" id="auto-toggle">
              自动 5s 刷新
            </label>
          </div>
        </div>
      </section>

      <div id="error-area"></div>

      <section class="grid four" id="overview-grid">
        <article class="metric"><div class="metric-label">主进程 PID</div><div class="metric-value">—</div></article>
        <article class="metric"><div class="metric-label">逻辑 / 物理核心</div><div class="metric-value">—</div></article>
        <article class="metric"><div class="metric-label">内存使用率</div><div class="metric-value">—</div><div class="progress"><span></span></div></article>
        <article class="metric"><div class="metric-label">系统平均负载</div><div class="metric-value">—</div><div class="metric-sub">1m / 5m / 15m</div></article>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>各 CPU 核心使用率</h2>
        </div>
        <div class="panel-body">
          <div class="terminal" id="cpu-grid">暂无数据</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>进程列表 <span class="count" id="proc-count"></span></h2>
        </div>
        <div class="table-wrap">
          <table id="proc-table">
            <thead>
              <tr>
                <th>PID</th>
                <th>父 PID</th>
                <th>名称</th>
                <th>状态</th>
                <th>CPU %</th>
                <th>核心</th>
                <th>亲和性</th>
                <th>线程</th>
                <th>RSS (MB)</th>
                <th>内存 %</th>
                <th>FD</th>
                <th>创建时间</th>
                <th>命令行</th>
              </tr>
            </thead>
            <tbody id="proc-body">
              <tr><td colspan="13" class="empty">点击上方按钮加载</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/static-auth.js"></script>
  <script src="assets/redesign-processes.js"></script>
</body>
</html>
