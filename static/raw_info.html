<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原始采集数据查看</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0F;
            --surface: #111118;
            --surface-2: #16161F;
            --surface-3: #1C1C26;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text: #E4E4E7;
            --text-2: #A1A1AA;
            --text-3: #71717A;
            --accent: #38BDF8;
            --accent-2: #0EA5E9;
            --accent-soft: rgba(56, 189, 248, 0.10);
            --green: #10B981;
            --red: #EF4444;
            --radius-sm: 8px;
            --radius: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px -16px rgba(0, 0, 0, 0.7);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(60% 50% at 50% -10%, rgba(56, 189, 248, 0.06), transparent 70%),
                radial-gradient(40% 40% at 100% 100%, rgba(168, 85, 247, 0.04), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 720px;
            box-shadow: var(--shadow-lg);
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid;
            place-items: center;
            color: #0A0A0F;
            box-shadow: 0 8px 24px -8px rgba(56, 189, 248, 0.5);
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        h2 {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-3);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2 .count {
            color: var(--text-3);
            font-family: var(--font-mono);
            text-transform: none;
            letter-spacing: 0;
            padding: 1px 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 400;
        }

        .row { margin-bottom: 16px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
        }

        label .req { color: var(--red); margin-left: 2px; }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px 12px;
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text);
            transition: border-color 150ms ease, background 150ms ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface-3);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        input::placeholder { color: var(--text-3); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            padding: 10px 18px;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease;
            white-space: nowrap;
        }

        .btn:hover { background: var(--surface-2); border-color: rgba(255, 255, 255, 0.16); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .btn[disabled] { opacity: 0.5; cursor: not-allowed; }

        .btn.primary {
            background: var(--accent);
            color: #0A0A0F;
            border-color: var(--accent);
            font-weight: 600;
        }
        .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }

        .btn svg { width: 14px; height: 14px; }

        .result {
            margin-top: 24px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: none;
        }

        .section + .section { margin-top: 18px; }

        .kv {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 8px 14px;
            font-family: var(--font-mono);
            font-size: 12.5px;
        }

        .kv .k {
            color: var(--text-3);
            font-weight: 400;
        }

        .kv .v {
            color: var(--text);
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }

        .cams {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .cams span {
            padding: 4px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid rgba(56, 189, 248, 0.25);
            font-size: 12px;
            color: var(--accent);
            font-family: var(--font-mono);
        }

        .msg {
            margin-top: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 18px;
        }

        .msg svg { width: 14px; height: 14px; flex-shrink: 0; }

        .msg.error { color: #FCA5A5; }
        .msg.success { color: #6EE7B7; }
        .msg.loading { color: var(--text-3); }

        @media (max-width: 600px) {
            body { padding: 20px 16px; }
            .card { padding: 24px 20px; }
            .kv { grid-template-columns: 110px 1fr; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div>
                <h1>原始采集数据查看</h1>
                <div class="subtitle">按记录 ID 检索 capture 元信息</div>
            </div>
        </div>

        <div class="row">
            <label for="record_id">采集记录 ID <span class="req">*</span></label>
            <div class="input-group">
                <input id="record_id" type="number" placeholder="例如 1234" autocomplete="off">
                <button id="btn-query" class="btn primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    查询
                </button>
            </div>
        </div>

        <div id="msg" class="msg"></div>

        <div class="result" id="result">
            <div class="section">
                <h2>概要</h2>
                <div class="kv" id="summary"></div>
            </div>
            <div class="section">
                <h2>摄像头 <span class="count" id="cam-count">0</span></h2>
                <div class="cams" id="cams"></div>
            </div>
            <div class="section">
                <h2>Segment 文件 <span class="count" id="seg-count">0</span></h2>
                <div class="kv" id="segs"></div>
            </div>
        </div>
    </div>

    <script>
        const $id      = document.getElementById("record_id");
        const $btn     = document.getElementById("btn-query");
        const $msg     = document.getElementById("msg");
        const $result  = document.getElementById("result");
        const $summary = document.getElementById("summary");
        const $cams    = document.getElementById("cams");
        const $camCnt  = document.getElementById("cam-count");
        const $segs    = document.getElementById("segs");
        const $segCnt  = document.getElementById("seg-count");

        const ICONS = {
            error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
            loading: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        };

        function setMsg(text, cls) {
            const icon = cls && ICONS[cls] ? ICONS[cls] : '';
            $msg.innerHTML = text ? icon + '<span>' + text + '</span>' : '';
            $msg.className = "msg" + (cls ? " " + cls : "");
        }

        function row(k, v) {
            const rk = document.createElement("div");
            rk.className = "k";
            rk.textContent = k;
            const rv = document.createElement("div");
            rv.className = "v";
            rv.textContent = v ?? "";
            return [rk, rv];
        }

        function render(info) {
            $summary.innerHTML = "";
            const kvs = [
                ["record_id",      info.record_id],
                ["output_dir",     info.output_dir],
                ["capture_dir",    info.capture_dir],
                ["sealed",         info.sealed],
                ["frame_count",    info.frame_count],
                ["raw_bytes",      info.raw_bytes],
                ["start_time",     info.start_time],
                ["end_time",       info.end_time],
                ["sampled_frames", info.sampled_frames],
            ];
            for (const [k, v] of kvs) {
                const [a, b] = row(k, v);
                $summary.appendChild(a);
                $summary.appendChild(b);
            }

            $cams.innerHTML = "";
            $camCnt.textContent = info.camera_count;
            for (const cam of info.cameras) {
                const s = document.createElement("span");
                s.textContent = cam;
                $cams.appendChild(s);
            }

            $segs.innerHTML = "";
            $segCnt.textContent = info.segment_count;
            for (let i = 0; i < info.segments.length; i++) {
                const [a, b] = row("#" + (i + 1), info.segments[i]);
                $segs.appendChild(a);
                $segs.appendChild(b);
            }

            $result.style.display = "block";
        }

        async function query() {
            const id = $id.value.trim();
            if (!id) {
                setMsg("请填写 record_id", "error");
                $id.focus();
                return;
            }
            setMsg("查询中…", "loading");
            $btn.disabled = true;
            $result.style.display = "none";
            try {
                const r = await fetch("/api/storage/raw-info?record_id=" + encodeURIComponent(id));
                const j = await r.json();
                if (!r.ok) {
                    setMsg("查询失败: " + (j.message || r.status), "error");
                    return;
                }
                render(j.data);
                setMsg("查询成功", "success");
            } catch (e) {
                setMsg("网络错误: " + e.message, "error");
            } finally {
                $btn.disabled = false;
            }
        }

        $btn.addEventListener("click", query);
        $id.addEventListener("keydown", (e) => { if (e.key === "Enter") query(); });
    </script>
</body>
</html>
