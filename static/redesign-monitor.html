<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统监控面板</title>
  <link rel="stylesheet" href="assets/vercel-redesign.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html">
          <span class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><title>系统监控</title><path d="M4 4h16v16H4z"></path><path d="M8 8h8v8H8z"></path></svg>
          </span>
          <span class="brand-copy">
            <span class="brand-title">percept-static</span>
            <span class="brand-subtitle">系统监控面板</span>
          </span>
        </a>
        <nav class="topnav" aria-label="页面导航">
          <a href="index.html">入口</a>
          <a href="redesign-upload-reconcile.html">补偿上传</a>
          <a href="redesign-collection.html">数据采集</a>
          <a class="active" href="redesign-monitor.html">系统监控</a>
          <a href="redesign-processes.html">进程监控</a>
          <a href="redesign-unlock.html">采集锁</a>
          <a href="redesign-raw-info.html">原始数据</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <a class="backlink" href="index.html">← 返回入口</a>
      <section class="hero">
        <div class="hero-stack">
          <div class="eyebrow">/api/monitor</div>
          <h1>系统监控面板</h1>
          <p class="lead" id="lastUpdate">正在加载…</p>
        </div>
        <div class="summary-strip">
          <div class="static-auth-status" data-static-auth-status></div>
          <button class="btn" id="refreshBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><title>刷新监控数据</title><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            刷新
          </button>
        </div>
      </section>

      <div class="layout">
        <main class="stack">
          <div id="error" class="callout" hidden>
            <span id="errorText"></span>
          </div>
          <div id="loading" class="callout">正在加载数据</div>

          <section class="grid two" id="content">
            <article class="card">
              <div class="card-title"><h2>CPU 信息</h2></div>
              <div class="stack">
                <div class="status-line"><span class="muted">总核心数</span><span id="cpuTotalCores">-</span></div>
                <div class="status-line"><span class="muted">物理核心数</span><span id="cpuPhysicalCores">-</span></div>
                <div class="status-line"><span class="muted">CPU 使用率</span><span id="cpuPercent">-</span></div>
                <div class="progress"><span id="cpuProgress"></span></div>
                <div class="status-line"><span class="muted" id="cpuProgressText">0.0%</span></div>
                <div class="status-line"><span class="muted">频率范围</span><span id="cpuFreq">-</span></div>
              </div>
            </article>

            <article class="card">
              <div class="card-title"><h2>内存信息</h2></div>
              <div class="stack">
                <div class="status-line"><span class="muted">总内存</span><span id="memTotal">-</span></div>
                <div class="status-line"><span class="muted">已使用</span><span id="memUsed">-</span></div>
                <div class="status-line"><span class="muted">可用</span><span id="memAvailable">-</span></div>
                <div class="status-line"><span class="muted">使用率</span><span id="memPercent">-</span></div>
                <div class="progress"><span id="memProgress"></span></div>
                <div class="status-line"><span class="muted" id="memProgressText">0.0%</span></div>
              </div>
            </article>

            <article class="card">
              <div class="card-title"><h2>磁盘信息</h2></div>
              <div class="stack">
                <div class="status-line"><span class="muted">总容量</span><span id="diskTotal">-</span></div>
                <div class="status-line"><span class="muted">已使用</span><span id="diskUsed">-</span></div>
                <div class="status-line"><span class="muted">可用</span><span id="diskFree">-</span></div>
                <div class="status-line"><span class="muted">使用率</span><span id="diskPercent">-</span></div>
                <div class="progress"><span id="diskProgress"></span></div>
                <div class="status-line"><span class="muted" id="diskProgressText">0.0%</span></div>
              </div>
            </article>

            <article class="card">
              <div class="card-title"><h2>平台信息</h2></div>
              <div class="stack">
                <div class="status-line"><span class="muted">系统</span><span id="platformSystem">-</span></div>
                <div class="status-line"><span class="muted">平台</span><span id="platformPlatform">-</span></div>
                <div class="status-line"><span class="muted">版本</span><span id="platformRelease">-</span></div>
                <div class="status-line"><span class="muted">MAC 地址</span><span id="platformMac">-</span></div>
                <div class="status-line"><span class="muted">IP 地址</span><span id="platformIp">-</span></div>
              </div>
            </article>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>机器人状态</h2>
            </div>
            <div class="panel-body stack" id="robotInfo">
              <div class="kv">
                <div class="k">机器人型号</div><div class="v" id="robotModel">-</div>
                <div class="k">机器人类型</div><div class="v" id="robotType">-</div>
                <div class="k">描述</div><div class="v" id="robotDesc">-</div>
                <div class="k">注册信息</div><div class="v" id="robotRegisterInfo">-</div>
              </div>
              <div id="components" class="terminal">正在加载数据</div>
            </div>
          </section>
        </main>
      </div>
    </main>
  </div>
  <script src="assets/static-auth.js"></script>
  <script src="assets/redesign-monitor.js"></script>
</body>
</html>
