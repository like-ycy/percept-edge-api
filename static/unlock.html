<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采集锁解除</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0F;
            --surface: #111118;
            --surface-2: #16161F;
            --surface-3: #1C1C26;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.10);
            --text: #E4E4E7;
            --text-2: #A1A1AA;
            --text-3: #71717A;
            --accent: #38BDF8;
            --accent-2: #0EA5E9;
            --accent-soft: rgba(56, 189, 248, 0.10);
            --green: #10B981;
            --green-soft: rgba(16, 185, 129, 0.12);
            --red: #EF4444;
            --red-soft: rgba(239, 68, 68, 0.12);
            --radius-sm: 8px;
            --radius: 10px;
            --radius-lg: 14px;
            --shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px -16px rgba(0, 0, 0, 0.7);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 20px;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(60% 50% at 50% -10%, rgba(56, 189, 248, 0.06), transparent 70%),
                radial-gradient(40% 40% at 100% 100%, rgba(239, 68, 68, 0.04), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 560px;
            box-shadow: var(--shadow-lg);
            z-index: 1;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid;
            place-items: center;
            color: #0A0A0F;
            box-shadow: 0 8px 24px -8px rgba(56, 189, 248, 0.5);
        }

        .header-text { flex: 1; }

        h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--font-sans);
            letter-spacing: 0.04em;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 3px currentColor;
            opacity: 0.4;
        }

        .badge.locked { background: var(--red-soft); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.25); }
        .badge.unlocked { background: var(--green-soft); color: var(--green); border: 1px solid rgba(16, 185, 129, 0.25); }

        h2 {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-3);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .status {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
            font-family: var(--font-mono);
            font-size: 12.5px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-2);
        }

        .row { margin-bottom: 16px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
        }

        label .req { color: var(--red); margin-left: 2px; }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text);
            transition: border-color 150ms ease, background 150ms ease;
        }

        textarea {
            font-family: var(--font-mono);
            font-size: 12.5px;
            resize: vertical;
            min-height: 72px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface-3);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        input::placeholder, textarea::placeholder { color: var(--text-3); }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            padding: 10px 18px;
            cursor: pointer;
            transition: background 150ms ease, border-color 150ms ease;
            white-space: nowrap;
        }

        .btn:hover { background: var(--surface-2); border-color: rgba(255, 255, 255, 0.16); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

        .btn.danger {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
            font-weight: 600;
        }
        .btn.danger:hover:not([disabled]) { background: #DC2626; border-color: #DC2626; }

        .btn svg { width: 14px; height: 14px; }

        .msg {
            margin-top: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 18px;
        }

        .msg svg { width: 14px; height: 14px; flex-shrink: 0; }

        .msg.error { color: #FCA5A5; }
        .msg.success { color: #6EE7B7; }
        .msg.loading { color: var(--text-3); }

        @media (max-width: 600px) {
            body { padding: 20px 16px; }
            .card { padding: 24px 20px; }
            .btn-row { flex-direction: column; }
            .btn-row .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            </div>
            <div class="header-text">
                <h1>
                    采集全局锁
                    <span id="badge" class="badge unlocked">UNKNOWN</span>
                </h1>
                <div class="subtitle">手动解锁采集流水线</div>
            </div>
        </div>

        <div class="row">
            <h2>当前状态</h2>
            <div class="status" id="status">加载中…</div>
        </div>

        <div class="row">
            <label for="operator">操作者 <span class="req">*</span></label>
            <input id="operator" type="text" placeholder="姓名或工号" autocomplete="off">
        </div>

        <div class="row">
            <label for="note">备注</label>
            <textarea id="note" placeholder="可选，描述解锁原因"></textarea>
        </div>

        <div class="btn-row">
            <button id="btn-release" class="btn danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
                解锁
            </button>
            <button id="btn-refresh" class="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                刷新状态
            </button>
        </div>

        <div id="msg" class="msg"></div>
    </div>

    <script>
        const STATUS_URL  = "/api/collection/lock/status";
        const RELEASE_URL = "/api/collection/lock/release";

        const $status   = document.getElementById("status");
        const $badge    = document.getElementById("badge");
        const $msg      = document.getElementById("msg");
        const $operator = document.getElementById("operator");
        const $note     = document.getElementById("note");
        const $release  = document.getElementById("btn-release");
        const $refresh  = document.getElementById("btn-refresh");

        const ICONS = {
            error:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
            loading: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        };

        function setMsg(text, cls) {
            const icon = cls && ICONS[cls] ? ICONS[cls] : '';
            $msg.innerHTML = text ? icon + '<span>' + text + '</span>' : '';
            $msg.className = "msg" + (cls ? " " + cls : "");
        }

        function renderState(state) {
            const lines = [
                "locked              = " + state.locked,
                "reason              = " + (state.reason ?? ""),
                "triggered_record_id = " + (state.triggered_record_id ?? ""),
                "triggered_at        = " + (state.triggered_at ?? ""),
                "released_at         = " + (state.released_at ?? ""),
                "released_by         = " + (state.released_by ?? ""),
                "release_note        = " + (state.release_note ?? ""),
            ];
            $status.textContent = lines.join("\n");
            if (state.locked) {
                $badge.textContent = "LOCKED";
                $badge.className = "badge locked";
                $release.disabled = false;
            } else {
                $badge.textContent = "UNLOCKED";
                $badge.className = "badge unlocked";
                $release.disabled = true;
            }
        }

        async function loadStatus() {
            setMsg("");
            try {
                const r = await fetch(STATUS_URL);
                const j = await r.json();
                if (!r.ok) {
                    setMsg("加载失败: " + (j.message || r.status), "error");
                    return;
                }
                renderState(j.data);
            } catch (e) {
                setMsg("网络错误: " + e.message, "error");
            }
        }

        async function release() {
            const operator = $operator.value.trim();
            const note     = $note.value.trim();
            if (!operator) {
                setMsg("请填写操作者", "error");
                $operator.focus();
                return;
            }
            if (!confirm("确认解锁采集全局锁？")) return;

            $release.disabled = true;
            setMsg("解锁中…", "loading");
            try {
                const r = await fetch(RELEASE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ operator, note: note || null }),
                });
                const j = await r.json();
                if (!r.ok) {
                    setMsg("解锁失败: " + (j.message || r.status), "error");
                    $release.disabled = false;
                    return;
                }
                renderState(j.data);
                setMsg("解锁成功", "success");
            } catch (e) {
                setMsg("网络错误: " + e.message, "error");
                $release.disabled = false;
            }
        }

        $release.addEventListener("click", release);
        $refresh.addEventListener("click", loadStatus);
        loadStatus();
    </script>
</body>
</html>
